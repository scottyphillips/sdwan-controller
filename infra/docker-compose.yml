version: '3.8'

services:
  # The Source of Truth (IPAM & Intent)
  postgres-sdwan:
    image: postgres:16-alpine
    container_name: sdwan_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # The Telemetry Cache (Real-time Performance)
  redis-cache:
    image: redis:7-alpine
    container_name: sdwan_cache
    ports:
      - "6379:6379"
    restart: unless-stopped

  # The LLM Engine (Cognitive Auditor)
  ollama-engine:
    image: ollama/ollama:latest
    container_name: sdwan_llm
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - OLLAMA_FLASH_ATTENTION=1 # Speed boost for 50-series GPUs
      - OLLAMA_KEEP_ALIVE=24h    # Keeps your 14B model "hot" in VRAM
    restart: unless-stopped

  # Network ingest (Ansible + Juniper). Run on demand: docker compose --profile ingest run --rm ingest
  ingest:
    build:
      context: ..
      dockerfile: ingest/Dockerfile
    env_file: ../.env
    environment:
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JUNIPER_HOST: ${JUNIPER_HOST:-}
      JUNIPER_USER: ${JUNIPER_USER:-admin}
      JUNIPER_PASSWORD: ${JUNIPER_PASSWORD:-}
      JUNIPER_NETCONF_PORT: ${JUNIPER_NETCONF_PORT:-830}
    network_mode: host
    volumes:
      - ingest_known_hosts:/root/.ssh
    profiles:
      - ingest

volumes:
  pgdata:
  ollama_data: # Persists your DeepSeek models
  ingest_known_hosts: # Persists SSH known_hosts for ingest targets (vSRX, etc.)